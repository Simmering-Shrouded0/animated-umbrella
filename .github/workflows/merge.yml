name: Auto-Merge Domain Lists
on:
  schedule:
    - cron: '0 4 * * *' # Runs automatically every day at 4:00 AM
  workflow_dispatch: # Allows you to click a button to run it manually

permissions:
  contents: write # Allows the bot to save the combined file

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download and Combine Lists
        run: |
          # 1. Initialize our tracking files
          > raw-domains.txt
          > processed.txt
          cp companies.txt pending.txt

          # 2. Process the queue until it is completely empty
          while [ -s pending.txt ]; do
            
            # Grab the top company from the pending list (and strip hidden Windows line breaks)
            company=$(head -n 1 pending.txt | tr -d '\r')
            
            # Remove that top company from the pending list
            tail -n +2 pending.txt > temp.txt && mv temp.txt pending.txt

            # Skip if it is empty, a comment, or we have already processed it
            if [[ -z "$company" || "$company" == \#* ]] || grep -qx "$company" processed.txt; then
              continue
            fi

            echo "Downloading and parsing: $company"
            
            # Mark as processed so we don't download it twice
            echo "$company" >> processed.txt

            # Download the list content into memory
            content=$(curl -s "https://raw.githubusercontent.com/v2fly/domain-list-community/refs/heads/master/data/$company")

            # Check for 'include:' tags and add those new lists to the bottom of the pending queue
            echo "$content" | grep -E '^include:' | sed 's/^include://' >> pending.txt

            # Extract domains, strip attributes (@!cn), strip prefixes, and add to our raw list
            echo "$content" | grep -vE '^(#|include:)' | awk '{print $1}' | sed -E 's/^(full:|domain:|keyword:|regexp:)//' >> raw-domains.txt
            
          done || true

          # 3. Deduplicate! 
          # sort -u removes all duplicates, grep . removes any blank lines
          sort -u raw-domains.txt | grep . > master-list.txt

          # 4. Append your personal custom domains at the very end
          echo "" >> master-list.txt
          cat my-custom-domains.txt >> master-list.txt || true

      - name: Save the Master File to Repository
        run: |
          git config --global user.name "Auto-Merger Bot"
          git config --global user.email "bot@github.com"
          git add master-list.txt
          # Only commit if the upstream lists actually changed
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated update of combined list"
          git push
